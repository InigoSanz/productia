version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: productia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: productia
      POSTGRES_USER: productia
      POSTGRES_PASSWORD: productia
    ports:
      - "5432:5432"
    volumes:
      - productia_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

volumes:
  productia_postgres_data: